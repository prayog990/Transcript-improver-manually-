<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TranscriptSync — Live Word Highlighter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --surface2:  #1a1a26;
    --border:    #2a2a3e;
    --accent:    #e8ff47;
    --accent2:   #47ffe8;
    --dim:       #aaaaaa;
    --muted:     #555566;
    --text:      #e8e8f0;
    --danger:    #ff4757;
    --radius:    12px;
    --mono:      'Space Mono', monospace;
    --sans:      'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── SCREEN SYSTEM ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ══════════════════════════════════════════
     SCREEN 1 — INPUT
  ══════════════════════════════════════════ */
  #screen1 {
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px;
    background:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(232,255,71,.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 90% 80%, rgba(71,255,232,.04) 0%, transparent 60%),
      var(--bg);
  }

  .brand {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown .6s ease both;
  }
  .brand-logo {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .brand-title {
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -1px;
  }
  .brand-title span { color: var(--accent); }
  .brand-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--dim);
    font-weight: 300;
  }

  .upload-form {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Drop zones */
  .drop-zone {
    position: relative;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .25s, background .25s, transform .15s;
    animation: fadeUp .55s ease both;
  }
  .drop-zone:nth-child(2) { animation-delay: .1s; }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,255,71,.04);
    transform: translateY(-2px);
  }
  .drop-zone.filled { border-color: var(--accent2); border-style: solid; }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-icon {
    font-size: 36px;
    margin-bottom: 12px;
    display: block;
  }
  .drop-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .drop-sub {
    font-size: 13px;
    color: var(--dim);
  }
  .drop-filename {
    margin-top: 10px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent2);
    word-break: break-all;
  }

  /* Transcript textarea section */
  .transcript-section {
    animation: fadeUp .55s .2s ease both;
  }
  .section-label {
    font-size: 12px;
    font-family: var(--mono);
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .transcript-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .25s;
  }
  .transcript-box:focus-within { border-color: var(--accent); }

  .transcript-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .ttab {
    flex: 1;
    padding: 10px;
    font-size: 12px;
    font-family: var(--mono);
    letter-spacing: 1px;
    text-align: center;
    cursor: pointer;
    color: var(--dim);
    border: none;
    background: none;
    transition: color .2s, background .2s;
  }
  .ttab.active { color: var(--accent); background: rgba(232,255,71,.05); }

  .ttab-pane { display: none; }
  .ttab-pane.active { display: block; }

  #transcriptText {
    width: 100%;
    min-height: 160px;
    max-height: 260px;
    background: transparent;
    border: none;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    resize: vertical;
    outline: none;
    line-height: 1.7;
  }
  #transcriptText::placeholder { color: var(--muted); }

  .file-drop-small {
    padding: 24px;
    text-align: center;
    cursor: pointer;
    position: relative;
  }
  .file-drop-small input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-drop-small p { font-size: 13px; color: var(--dim); }
  .file-drop-small span { color: var(--accent); }

  /* Sample transcript button */
  .sample-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--dim);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: var(--mono);
    transition: color .2s, border-color .2s;
    margin-top: 8px;
  }
  .sample-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  /* SYNC NOW button */
  .sync-btn {
    width: 100%;
    padding: 18px;
    font-size: 16px;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: transform .15s, box-shadow .2s, background .2s;
    box-shadow: 0 0 32px rgba(232,255,71,.3);
    animation: fadeUp .55s .3s ease both;
  }
  .sync-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 48px rgba(232,255,71,.5);
  }
  .sync-btn:active { transform: translateY(0); }
  .sync-btn:disabled {
    background: var(--muted);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* ══════════════════════════════════════════
     SCREEN 2 — PLAYER + SYNC
  ══════════════════════════════════════════ */
  #screen2 {
    flex-direction: column;
    background: var(--bg);
    height: 100vh;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-back {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--dim);
    background: none;
    border: none;
    cursor: pointer;
    transition: color .2s;
  }
  .topbar-back:hover { color: var(--accent); }
  .topbar-title {
    font-size: 13px;
    font-family: var(--mono);
    letter-spacing: 2px;
    color: var(--text);
  }
  .topbar-actions { display: flex; gap: 8px; }

  /* Media player */
  .player-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    flex-shrink: 0;
  }

  #mediaPlayer {
    width: 100%;
    max-height: 200px;
    border-radius: 8px;
    background: #000;
    display: none;
    margin-bottom: 12px;
  }
  #mediaPlayer.visible { display: block; }

  /* Custom player controls */
  .player-controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .seek-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .time-display {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    white-space: nowrap;
    min-width: 90px;
    text-align: right;
  }
  .seek-bar {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    position: relative;
  }
  .seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(232,255,71,.6);
  }
  .seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border: none;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 0 20px rgba(232,255,71,.3);
  }
  .play-btn:hover { transform: scale(1.08); }
  .play-btn:active { transform: scale(.96); }

  .speed-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--dim);
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  .speed-btn:hover, .speed-btn.active { color: var(--accent); border-color: var(--accent); }

  .vol-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .vol-icon { font-size: 14px; color: var(--dim); }
  .vol-bar {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .vol-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--dim);
    cursor: pointer;
  }

  /* Transcript controls */
  .transcript-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .transcript-controls::-webkit-scrollbar { display: none; }

  .ctrl-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 7px 12px;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: .5px;
    color: var(--dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: color .2s, border-color .2s, background .2s;
    flex-shrink: 0;
  }
  .ctrl-btn:hover { color: var(--text); border-color: var(--muted); }
  .ctrl-btn.on { color: var(--accent); border-color: var(--accent); background: rgba(232,255,71,.07); }
  .ctrl-btn .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .ctrl-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  .font-ctrl {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .font-btn {
    width: 28px; height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  .font-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* Transcript view */
  .transcript-view {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    scroll-behavior: smooth;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }
  .transcript-view::-webkit-scrollbar { width: 4px; }
  .transcript-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .transcript-view::-webkit-scrollbar-track { background: transparent; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state p { font-size: 14px; }

  /* Lines */
  .t-line {
    display: flex;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background .2s;
    align-items: flex-start;
  }
  .t-line:hover { background: rgba(255,255,255,.03); }
  .t-line.active {
    background: rgba(232,255,71,.07);
    border-left: 2px solid var(--accent);
    padding-left: 8px;
  }
  .t-line.past {}

  .t-ts {
    display: none;
  }

  .t-text {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.65;
    color: var(--dim);
    flex: 1;
    word-break: break-word;
    transition: color .2s;
    outline: none;
  }
  .t-line.active .t-text { color: var(--text); }

  /* Words */
  .word {
    color: #555566;
    transition: color .15s linear;
    display: inline;
  }
  .word.lit {
    color: var(--accent);
  }
  .word.past-lit { color: var(--dim); }

  /* Bottom actions */
  .bottom-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 10px;
    flex-shrink: 0;
    display: flex;
    gap: 6px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 9px 6px;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: color .2s, border-color .2s, background .2s;
    flex: 1;
    min-width: 0;
  }
  .action-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(232,255,71,.05); }
  .action-btn.primary {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }
  .action-btn.primary:hover { background: #f0ff6a; border-color: #f0ff6a; }

  /* Notification toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent2); color: var(--accent2); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--danger);
    animation: pulse 1.2s ease-in-out infinite;
    margin-right: 4px;
  }

  /* Playback indicator in topbar */
  .playback-status {
    display: flex;
    align-items: center;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--dim);
  }

  /* Edit mode indicator */
  .edit-indicator {
    display: none;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--accent2);
    padding: 2px 8px;
    border: 1px solid var(--accent2);
    border-radius: 4px;
  }
  .edit-mode .edit-indicator { display: inline; }

  /* Responsive: if wide screen show video nicely */
  @media (min-width: 600px) {
    #screen1 { padding: 60px 24px 80px; }
    .t-text { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- ══ SCREEN 1: INPUT ══════════════════════════════════ -->
<section id="screen1" class="screen active">

  <div class="brand">
    <div class="brand-logo">▶ TranscriptSync</div>
    <h1 class="brand-title">Sync your words<br>to <span>every beat</span></h1>
    <p class="brand-sub">Upload media · Load transcript · Watch it animate</p>
  </div>

  <div class="upload-form">

    <!-- Media upload -->
    <div class="drop-zone" id="mediaZone">
      <input type="file" id="mediaFile" accept="audio/*,video/*">
      <span class="drop-icon">🎬</span>
      <div class="drop-title">Upload Media</div>
      <div class="drop-sub">Drag & drop or tap · Audio or Video</div>
      <div class="drop-filename" id="mediaName"></div>
    </div>

    <!-- Transcript -->
    <div class="transcript-section">
      <div class="section-label">Transcript</div>
      <div class="transcript-box">
        <div class="transcript-tabs">
          <button class="ttab active" data-pane="paste">PASTE TEXT</button>
          <button class="ttab" data-pane="upload">UPLOAD .TXT</button>
        </div>
        <div class="ttab-pane active" id="pane-paste">
          <textarea id="transcriptText" placeholder="[00:00:01] Hello and welcome to the show.
[00:00:04] Today we explore something amazing.
[00:00:08] Let the words light up as we go."></textarea>
        </div>
        <div class="ttab-pane" id="pane-upload">
          <div class="file-drop-small" id="txFileZone">
            <input type="file" id="txFile" accept=".txt">
            <p>Tap to load <span>.txt file</span></p>
            <div class="drop-filename" id="txFileName"></div>
          </div>
        </div>
      </div>
      <button class="sample-btn" id="loadSampleBtn">✦ Load sample transcript</button>
    </div>

    <button class="sync-btn" id="syncNowBtn">SYNC NOW →</button>

  </div>
</section>

<!-- ══ SCREEN 2: PLAYER + SYNC ═══════════════════════════ -->
<section id="screen2" class="screen">

  <div class="topbar">
    <div class="topbar-title">TRANSCRIPT SYNC</div>
    <div class="playback-status" id="playbackStatus"></div>
  </div>

  <!-- Media player -->
  <div class="player-wrap">
    <video id="mediaPlayer"></video>

    <div class="player-controls">
      <div class="seek-row">
        <input type="range" class="seek-bar" id="seekBar" min="0" max="100" step="0.01" value="0">
        <div class="time-display"><span id="currentTime">0:00</span> / <span id="duration">0:00</span></div>
      </div>
      <div class="btn-row">
        <button class="speed-btn active" data-speed="1">1×</button>
        <button class="speed-btn" data-speed="1.25">1.25×</button>
        <button class="speed-btn" data-speed="1.5">1.5×</button>
        <button class="speed-btn" data-speed="2">2×</button>
        <div class="vol-row">
          <span class="vol-icon">🔊</span>
          <input type="range" class="vol-bar" id="volBar" min="0" max="1" step="0.02" value="1">
        </div>
      </div>
    </div>
  </div>

  <!-- Transcript control strip -->
  <div class="transcript-controls">
    <button class="ctrl-btn on" id="autoScrollToggle">
      <span class="dot"></span> AUTO-SCROLL
    </button>
    <span class="ctrl-sep"></span>
    <div class="font-ctrl">
      <button class="font-btn" id="fontDown">A-</button>
      <button class="font-btn" id="fontUp">A+</button>
    </div>
  </div>

  <!-- Transcript view (main) -->
  <div style="position:relative; flex:1; overflow:hidden; display:flex; flex-direction:column;">
    <div class="transcript-view" id="transcriptView">
      <div class="empty-state"><p>No transcript loaded.</p></div>
    </div>
    <!-- Floating play/pause button -->
    <button id="playBtn" style="
      position:absolute;
      bottom:16px;
      right:16px;
      width:52px; height:52px;
      border-radius:50%;
      background:var(--accent);
      color:var(--bg);
      border:none;
      font-size:20px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 24px rgba(232,255,71,.45), 0 4px 12px rgba(0,0,0,.5);
      transition:transform .15s, box-shadow .2s;
      z-index:10;
    ">▶</button>
  </div>

  <!-- Bottom actions -->
  <div class="bottom-bar">
    <button class="action-btn primary" id="exportTxtBtn">↓ Export TXT</button>
    <button class="action-btn" id="copyAllBtn">⎘ Copy</button>
    <button class="action-btn" id="reprocessBtn">↺ Re-sync</button>
    <button class="action-btn" id="backBtn">← Back</button>
  </div>

  <!-- Rename modal -->
  <div id="renameModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; align-items:center; justify-content:center;">
    <div style="background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:24px 20px; width:min(90vw,360px); display:flex; flex-direction:column; gap:14px;">
      <div style="font-family:var(--mono); font-size:12px; letter-spacing:2px; color:var(--dim);">EXPORT AS</div>
      <input id="renameInput" type="text" placeholder="transcript" style="background:var(--surface); border:1.5px solid var(--border); border-radius:8px; padding:11px 14px; font-family:var(--mono); font-size:14px; color:var(--text); outline:none; width:100%; transition:border-color .2s;">
      <div style="font-size:11px; color:var(--muted); font-family:var(--mono);">.txt will be added automatically</div>
      <div style="display:flex; gap:10px;">
        <button id="renameCancelBtn" style="flex:1; padding:11px; font-family:var(--mono); font-size:12px; color:var(--dim); background:var(--surface); border:1px solid var(--border); border-radius:8px; cursor:pointer;">CANCEL</button>
        <button id="renameConfirmBtn" style="flex:1; padding:11px; font-family:var(--mono); font-size:12px; color:var(--bg); background:var(--accent); border:none; border-radius:8px; cursor:pointer; font-weight:700;">DOWNLOAD</button>
      </div>
    </div>
  </div>

</section>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   TranscriptSync — Core Application
═══════════════════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────────────────
const state = {
  mediaURL:      null,
  mediaFile:     null,
  rawTranscript: '',
  lines:         [],     // [{ts, seconds, text, words:[{text,el}], lineEl, tsEl, textEl}]
  fontSize:      15,
  editMode:      false,
  autoScroll:    true,
  activeIdx:     -1,
  wordTimer:     null,
  lastWordIdx:   -1,
  isPlaying:     false,
};

// ── DOM refs ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const screen1    = $('screen1');
const screen2    = $('screen2');
const mediaFile  = $('mediaFile');
const mediaZone  = $('mediaZone');
const mediaName  = $('mediaName');
const txFile     = $('txFile');
const txFileName = $('txFileName');
const txText     = $('transcriptText');
const syncBtn    = $('syncNowBtn');
const loadSample = $('loadSampleBtn');
const backBtn    = $('backBtn');
const mediaEl    = $('mediaPlayer');
const seekBar    = $('seekBar');
const playBtn    = $('playBtn');
const currentTimeEl = $('currentTime');
const durationEl = $('duration');
const volBar     = $('volBar');
const editToggle = $('editToggle');
const autoScrollToggle = $('autoScrollToggle');
const fontUp     = $('fontUp');
const fontDown   = $('fontDown');
const tView      = $('transcriptView');
const toastEl    = $('toast');
const editIndicator = $('editIndicator');
const editModeClass = 'edit-mode';

// ── Utilities ─────────────────────────────────────────────────
function toast(msg, type='') {
  toastEl.textContent = msg;
  toastEl.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toastEl.className = 'toast', 2200);
}

function formatTime(s) {
  if (isNaN(s) || s < 0) return '0:00';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${m}:${String(sec).padStart(2,'0')}`;
}

function parseTimestamp(ts) {
  // accepts HH:MM:SS or MM:SS
  const parts = ts.trim().replace(/[\[\]]/g,'').split(':').map(Number);
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  return 0;
}

function toTimestamp(secs) {
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = Math.floor(secs%60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── Tab switching (screen 1) ───────────────────────────────────
document.querySelectorAll('.ttab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ttab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.ttab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $('pane-' + btn.dataset.pane).classList.add('active');
  });
});

// ── Drag & drop helpers ────────────────────────────────────────
function setupDropZone(zone, input, onFile) {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) onFile(file);
  });
  input.addEventListener('change', () => { if (input.files[0]) onFile(input.files[0]); });
}

setupDropZone(mediaZone, mediaFile, file => {
  state.mediaFile = file;
  if (state.mediaURL) URL.revokeObjectURL(state.mediaURL);
  state.mediaURL = URL.createObjectURL(file);
  mediaName.textContent = '✓ ' + file.name;
  mediaZone.classList.add('filled');
});

setupDropZone($('txFileZone'), txFile, file => {
  const reader = new FileReader();
  reader.onload = e => {
    txText.value = e.target.result;
    txFileName.textContent = '✓ ' + file.name;
    // switch to paste pane to show content
    document.querySelectorAll('.ttab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.ttab-pane').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-pane="paste"]').classList.add('active');
    $('pane-paste').classList.add('active');
  };
  reader.readAsText(file);
});

// ── Sample transcript ──────────────────────────────────────────
const SAMPLE = `[00:00:01] Welcome to TranscriptSync, the live word highlighter.
[00:00:05] Simply load your audio or video file to begin.
[00:00:09] Then paste your transcript in the box below.
[00:00:13] Each line needs a timestamp like this one.
[00:00:17] When you press Sync Now the magic begins.
[00:00:21] Watch each word light up as the audio plays.
[00:00:25] You can click any line to jump to that moment.
[00:00:29] Toggle edit mode to fix typos on the fly.
[00:00:33] Auto scroll keeps the active line always visible.
[00:00:37] Download your transcript as TXT, JSON, or SRT.
[00:00:41] That is everything. Enjoy the show.`;

loadSample.addEventListener('click', () => {
  txText.value = SAMPLE;
  toast('Sample transcript loaded ✓', 'success');
});

// ── Parse transcript text ──────────────────────────────────────
function parseTranscript(raw) {
  const lines = [];
  const lineRe = /^\[(\d{1,2}:\d{2}:\d{2}|\d{1,2}:\d{2})\]\s*(.+)$/;
  raw.split('\n').forEach(row => {
    const m = row.trim().match(lineRe);
    if (m) {
      lines.push({
        ts:      m[1],
        seconds: parseTimestamp(m[1]),
        text:    m[2].trim(),
        words:   [],  // filled on render
      });
    }
  });
  // sort by time
  lines.sort((a,b) => a.seconds - b.seconds);
  return lines;
}

// ── Screen navigation ─────────────────────────────────────────
syncBtn.addEventListener('click', () => {
  const raw = txText.value.trim();
  if (!raw) { toast('Please add a transcript first.'); return; }
  state.rawTranscript = raw;
  state.lines = parseTranscript(raw);
  if (!state.lines.length) { toast('No valid [HH:MM:SS] lines found.'); return; }
  if (!state.mediaURL) { toast('No media file loaded — demo mode.'); }
  goToScreen2();
});

backBtn.addEventListener('click', () => {
  mediaEl.pause();
  stopWordTimer();
  screen2.classList.remove('active');
  screen1.classList.add('active');
});

function goToScreen2() {
  screen1.classList.remove('active');
  screen2.classList.add('active');
  // Setup media
  if (state.mediaURL) {
    const isVideo = state.mediaFile && state.mediaFile.type.startsWith('video/');
    mediaEl.src = state.mediaURL;
    if (isVideo) {
      mediaEl.classList.add('visible');
      // keep tag as video
    } else {
      mediaEl.classList.remove('visible');
    }
    mediaEl.load();
  }
  renderTranscript();
  applyFontSize();
}

// ── Render transcript ─────────────────────────────────────────
function renderTranscript() {
  tView.innerHTML = '';
  if (!state.lines.length) {
    tView.innerHTML = '<div class="empty-state"><p>No transcript lines.</p></div>';
    return;
  }

  const frag = document.createDocumentFragment();
  state.lines.forEach((line, i) => {
    const row = document.createElement('div');
    row.className = 't-line';
    row.dataset.idx = i;

    const tsEl = document.createElement('div');
    tsEl.className = 't-ts';
    tsEl.textContent = line.ts;

    const textEl = document.createElement('div');
    textEl.className = 't-text';

    // Build word spans
    const wordsArr = line.text.split(/\s+/).filter(Boolean);
    line.words = [];
    wordsArr.forEach((w, wi) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w;
      if (wi < wordsArr.length - 1) span.textContent += ' ';
      textEl.appendChild(span);
      line.words.push({ text: w, el: span });
    });

    // Store references
    line.lineEl  = row;
    line.tsEl    = tsEl;
    line.textEl  = textEl;

    row.appendChild(tsEl);
    row.appendChild(textEl);
    frag.appendChild(row);

    // Click to seek
    row.addEventListener('click', (e) => {
      if (state.mediaURL) {
        mediaEl.currentTime = line.seconds;
        if (!state.isPlaying) mediaEl.play();
      }
    });

    // Always editable
    textEl.contentEditable = 'true';
    textEl.addEventListener('blur', () => {
      rebuildLineWords(i);
    });
  });

  tView.appendChild(frag);
  resetWordHighlights();
  applyFontSize();
}

function rebuildLineWords(idx) {
  const line = state.lines[idx];
  if (!line) return;
  const newText = line.textEl.innerText.replace(/\n/g,' ').trim();
  line.text = newText;
  // Rebuild words
  line.textEl.innerHTML = '';
  line.words = [];
  const wordsArr = newText.split(/\s+/).filter(Boolean);
  wordsArr.forEach((w, wi) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = w;
    if (wi < wordsArr.length - 1) span.textContent += ' ';
    line.textEl.appendChild(span);
    line.words.push({ text: w, el: span });
  });
}

// ── Auto scroll ───────────────────────────────────────────────
autoScrollToggle.addEventListener('click', () => {
  state.autoScroll = !state.autoScroll;
  autoScrollToggle.classList.toggle('on', state.autoScroll);
  toast('Auto-scroll ' + (state.autoScroll ? 'ON' : 'OFF'));
});

// ── Font size ─────────────────────────────────────────────────
function applyFontSize() {
  document.querySelectorAll('.t-text').forEach(el => {
    el.style.fontSize = state.fontSize + 'px';
  });
}
fontUp.addEventListener('click', () => { state.fontSize = Math.min(28, state.fontSize + 1); applyFontSize(); toast('Font size: ' + state.fontSize + 'px'); });
fontDown.addEventListener('click', () => { state.fontSize = Math.max(10, state.fontSize - 1); applyFontSize(); toast('Font size: ' + state.fontSize + 'px'); });

// ── Media player ──────────────────────────────────────────────
mediaEl.addEventListener('loadedmetadata', () => {
  seekBar.max = mediaEl.duration || 100;
  durationEl.textContent = formatTime(mediaEl.duration);
});
mediaEl.addEventListener('timeupdate', onTimeUpdate);
mediaEl.addEventListener('play', () => { state.isPlaying = true; playBtn.textContent = '⏸'; startWordTimer(); });
mediaEl.addEventListener('pause', () => { state.isPlaying = false; playBtn.textContent = '▶'; stopWordTimer(); });
mediaEl.addEventListener('ended', () => { state.isPlaying = false; playBtn.textContent = '▶'; stopWordTimer(); });

playBtn.addEventListener('click', () => {
  if (!state.mediaURL) { toast('No media loaded.'); return; }
  state.isPlaying ? mediaEl.pause() : mediaEl.play();
});

seekBar.addEventListener('input', () => {
  if (state.mediaURL) mediaEl.currentTime = parseFloat(seekBar.value);
});

volBar.addEventListener('input', () => { mediaEl.volume = parseFloat(volBar.value); });

// Speed buttons
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (state.mediaURL) mediaEl.playbackRate = parseFloat(btn.dataset.speed);
  });
});

function onTimeUpdate() {
  const t = mediaEl.currentTime;
  seekBar.value = t;
  currentTimeEl.textContent = formatTime(t);
  highlightActiveLine(t);
}

// ── Line highlight logic ───────────────────────────────────────
function highlightActiveLine(currentTime) {
  const lines = state.lines;
  if (!lines.length) return;

  // Binary search for active line
  let idx = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].seconds <= currentTime) idx = i;
    else break;
  }

  if (idx !== state.activeIdx) {
    // Deactivate old
    if (state.activeIdx >= 0 && lines[state.activeIdx]) {
      lines[state.activeIdx].lineEl.classList.remove('active');
      // Fully light previous line's words
      lines[state.activeIdx].words.forEach(w => {
        w.el.classList.remove('lit');
        w.el.classList.add('past-lit');
      });
    }
    state.activeIdx = idx;
    state.lastWordIdx = -1;
    // Activate new
    lines[idx].lineEl.classList.add('active');
    if (state.autoScroll) scrollToLine(lines[idx].lineEl);
  }
}

function scrollToLine(el) {
  const container = tView;
  const elTop = el.offsetTop;
  const elH   = el.offsetHeight;
  const cH    = container.offsetHeight;
  const target = elTop - (cH / 2) + (elH / 2);
  container.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
}

// ── Word highlight (RAF-based) ────────────────────────────────
let _rafId = null;

function startWordTimer() {
  stopWordTimer();
  function tick() {
    updateWordHighlight();
    _rafId = requestAnimationFrame(tick);
  }
  _rafId = requestAnimationFrame(tick);
}

function stopWordTimer() {
  if (_rafId !== null) { cancelAnimationFrame(_rafId); _rafId = null; }
}

function updateWordHighlight() {
  const lines = state.lines;
  const idx   = state.activeIdx;
  if (idx < 0 || !lines[idx]) return;

  const line      = lines[idx];
  const words     = line.words;
  if (!words.length) return;

  const currentTime = mediaEl.currentTime;
  const lineStart   = line.seconds;

  // Duration until next line (or fallback)
  const nextLine    = lines[idx + 1];
  const duration    = nextLine ? nextLine.seconds - lineStart : 3;
  const effectiveDur = Math.max(duration, 0.5);

  const progress = currentTime - lineStart;
  const perWord  = effectiveDur / words.length;

  let wordsLit = Math.floor(progress / perWord);
  wordsLit = Math.max(0, Math.min(words.length, wordsLit));

  if (wordsLit === state.lastWordIdx) return; // no change
  state.lastWordIdx = wordsLit;

  words.forEach((w, i) => {
    if (i < wordsLit) {
      w.el.classList.add('lit');
    } else {
      w.el.classList.remove('lit');
    }
  });
}

function resetWordHighlights() {
  state.lines.forEach(line => {
    line.words.forEach(w => {
      w.el.classList.remove('lit', 'past-lit');
    });
    if (line.lineEl) line.lineEl.classList.remove('active');
  });
  state.activeIdx  = -1;
  state.lastWordIdx = -1;
}

// ── Re-sync ───────────────────────────────────────────────────
$('reprocessBtn').addEventListener('click', () => {
  state.lines.forEach((line, i) => {
    if (line.textEl) rebuildLineWords(i);
  });
  resetWordHighlights();
  if (state.mediaURL) highlightActiveLine(mediaEl.currentTime);
  toast('Re-synced ✓', 'success');
});

// ── Download / Export ─────────────────────────────────────────
function collectLines() {
  return state.lines.map(line => ({
    ts:      line.ts,
    seconds: line.seconds,
    text:    line.textEl ? line.textEl.innerText.replace(/\n/g,' ').trim() : line.text,
  }));
}

function downloadFile(content, name, type) {
  const blob = new Blob([content], { type });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

// ── Export TXT with rename ─────────────────────────────────────
const renameModal   = $('renameModal');
const renameInput   = $('renameInput');
const renameCancelBtn  = $('renameCancelBtn');
const renameConfirmBtn = $('renameConfirmBtn');

$('exportTxtBtn').addEventListener('click', () => {
  renameInput.value = 'transcript';
  renameModal.style.display = 'flex';
  setTimeout(() => renameInput.focus(), 50);
});

renameCancelBtn.addEventListener('click', () => {
  renameModal.style.display = 'none';
});

renameModal.addEventListener('click', e => {
  if (e.target === renameModal) renameModal.style.display = 'none';
});

renameInput.addEventListener('focus', () => {
  renameInput.style.borderColor = 'var(--accent)';
});
renameInput.addEventListener('blur', () => {
  renameInput.style.borderColor = 'var(--border)';
});

renameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') renameConfirmBtn.click();
  if (e.key === 'Escape') renameCancelBtn.click();
});

renameConfirmBtn.addEventListener('click', () => {
  const rawName = renameInput.value.trim() || 'transcript';
  const safeName = rawName.replace(/[^a-zA-Z0-9_\-. ]/g, '_');
  const fileName = safeName.endsWith('.txt') ? safeName : safeName + '.txt';
  const lines = collectLines();
  const content = lines.map(l => `[${l.ts}] ${l.text}`).join('\n');
  downloadFile(content, fileName, 'text/plain');
  renameModal.style.display = 'none';
  toast('Downloaded as ' + fileName + ' ✓', 'success');
});

$('copyAllBtn').addEventListener('click', () => {
  const lines = collectLines();
  const content = lines.map(l => `[${l.ts}] ${l.text}`).join('\n');
  navigator.clipboard.writeText(content).then(() => toast('Copied to clipboard ✓', 'success'))
    .catch(() => toast('Copy failed — use download instead.'));
});

// ── Seek progress gradient (visual polish) ────────────────────
function updateSeekGradient() {
  if (!mediaEl.duration) return;
  const pct = (mediaEl.currentTime / mediaEl.duration) * 100;
  seekBar.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, var(--surface2) ${pct}%, var(--surface2) 100%)`;
}
mediaEl.addEventListener('timeupdate', updateSeekGradient);
seekBar.addEventListener('input', updateSeekGradient);

// ── Keyboard shortcuts ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!screen2.classList.contains('active')) return;
  if (state.editMode && document.activeElement.isContentEditable) return;
  if (e.target.tagName === 'INPUT') return;

  switch(e.key) {
    case ' ':
      e.preventDefault();
      if (state.mediaURL) state.isPlaying ? mediaEl.pause() : mediaEl.play();
      break;
    case 'ArrowRight':
      if (state.mediaURL) mediaEl.currentTime = Math.min(mediaEl.duration, mediaEl.currentTime + 5);
      break;
    case 'ArrowLeft':
      if (state.mediaURL) mediaEl.currentTime = Math.max(0, mediaEl.currentTime - 5);
      break;
    case 'e': case 'E':
      editToggle.click();
      break;
    case 's': case 'S':
      autoScrollToggle.click();
      break;
  }
});

// ── Demo mode (no media) — simulate playback ──────────────────
// If no media loaded but transcript exists: allow "demo" via a virtual clock
let demoTimer = null;
let demoTime  = 0;

function startDemo() {
  if (state.mediaURL) return;
  stopDemo();
  const lastLine = state.lines[state.lines.length - 1];
  const maxTime  = lastLine ? lastLine.seconds + 5 : 30;
  const start    = Date.now() - demoTime * 1000;

  demoTimer = setInterval(() => {
    demoTime = (Date.now() - start) / 1000;
    if (demoTime >= maxTime) { demoTime = 0; }
    currentTimeEl.textContent = formatTime(demoTime);
    if (maxTime > 0) seekBar.value = (demoTime / maxTime) * 100;
    updateSeekGradient();
    highlightActiveLine(demoTime);
    updateWordHighlightDemo(demoTime);
  }, 50);

  state.isPlaying = true;
  playBtn.textContent = '⏸';
}

function stopDemo() {
  if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
  state.isPlaying = false;
  playBtn.textContent = '▶';
}

function updateWordHighlightDemo(currentTime) {
  const lines = state.lines;
  const idx   = state.activeIdx;
  if (idx < 0 || !lines[idx]) return;
  const line      = lines[idx];
  const words     = line.words;
  if (!words.length) return;
  const lineStart = line.seconds;
  const nextLine  = lines[idx + 1];
  const duration  = nextLine ? nextLine.seconds - lineStart : 3;
  const effectiveDur = Math.max(duration, 0.5);
  const progress  = currentTime - lineStart;
  const perWord   = effectiveDur / words.length;
  let wordsLit    = Math.floor(progress / perWord);
  wordsLit        = Math.max(0, Math.min(words.length, wordsLit));
  if (wordsLit === state.lastWordIdx) return;
  state.lastWordIdx = wordsLit;
  words.forEach((w, i) => {
    if (i < wordsLit) w.el.classList.add('lit');
    else w.el.classList.remove('lit');
  });
}

// Override play button if no media
playBtn.addEventListener('click', () => {
  if (state.mediaURL) return; // handled by media events
  if (state.isPlaying) stopDemo();
  else startDemo();
}, true);

// Volume bar is useless in demo
mediaEl.addEventListener('error', () => toast('Could not load media file.'));

// ── Init ──────────────────────────────────────────────────────
// Ensure screen1 is active on load
screen1.classList.add('active');
screen2.classList.remove('active');
</script>
</body>
</html>
