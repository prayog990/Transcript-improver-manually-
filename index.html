<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transcript Refinement Editor</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --primary: #bb86fc;
            --surface: #1e1e1e;
            --error: #cf6679;
            --border: #333;
            --highlight: #3700b3;
            --btn-text: #000;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --text-color: #212121;
            --primary: #6200ee;
            --surface: #ffffff;
            --error: #b00020;
            --border: #e0e0e0;
            --highlight: #bb86fc;
            --btn-text: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden; /* Page must never scroll */
            display: flex;
            flex-direction: column;
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 16px;
        }

        .screen.active {
            display: flex;
        }

        /* App Flow Layouts */
        #setup-screen { justify-content: center; align-items: center; text-align: center; }
        
        /* Progress Bar Styles */
        .progress-container {
            width: 100%;
            height: 10px;
            background-color: var(--border);
            border-radius: 5px;
            margin-top: 16px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.1s ease;
        }

        .card-panel {
            background: var(--surface);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid var(--border);
            background: var(--bg-color);
            color: var(--text-color);
            border-radius: 8px;
        }

        button {
            background-color: var(--primary);
            color: var(--btn-text);
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            min-height: 44px; /* Touch target */
            margin-top: 8px;
            width: 100%;
        }

        button:active { opacity: 0.8; }

        /* Main Editor Layout */
        #editor-screen { padding: 0; }
        
        #video-container {
            width: 100%;
            aspect-ratio: 16/9; /* Fixed ratio */
            background: #000;
            flex-shrink: 0;
        }

        #toolbar {
            background: var(--surface);
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tool-btn {
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
        }

        #transcript-area {
            flex-grow: 1;
            overflow-y: auto; /* Scrollable vertically */
            padding: 10px;
            position: relative;
        }

        /* Sentence Card */
        .sentence-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sentence-card.active-play {
            border-left: 4px solid var(--primary);
            background-color: rgba(98, 0, 238, 0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
        }

        .shuddh-text-area {
            width: 100%;
            background: transparent;
            color: var(--text-color);
            border: none;
            font-size: 18px;
            resize: none;
            outline: none;
            line-height: 1.5;
            min-height: 40px;
        }

        /* Confidence Colors */
        .conf-high { color: #4caf50; }
        .conf-med { color: #ffeb3b; }
        .conf-low { color: #ff9800; }
        .conf-poor { color: var(--error); }

    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <div class="card-panel">
            <h2>Transcript Editor</h2>
            <p>Shuddh Hindi Refinement Tool</p>
            
            <input type="text" id="yt-url" placeholder="Paste YouTube URL">
            <input type="file" id="json-upload" accept=".json">
            
            <div style="margin-top: 16px; background: rgba(187, 134, 252, 0.1); padding: 12px; border-radius: 8px; border: 1px dashed var(--primary); font-size: 14px; text-align: left;">
                <span style="color: #888;">Quick Test Link (Click to fill):</span><br>
                <a href="#" id="quick-test-link" style="color: var(--primary); text-decoration: none; word-break: break-all; font-weight: bold; display: inline-block; margin-top: 5px;">https://youtu.be/BJKJtB_bAfQ?si=f_wyXsx6xXqdzcrl</a>
            </div>

            <div id="project-summary" style="display:none; text-align:left; margin: 10px 0; font-size:14px;"></div>
            
            <button id="start-btn" style="display:none;">Start Processing</button>
        </div>
    </div>

    <div id="processing-screen" class="screen" style="justify-content: center; align-items: center; text-align: center;">
        <div class="card-panel">
            <h2>Processing Data...</h2>
            <p id="process-log">Loading Transcript...</p>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <p id="progress-text" style="margin-top: 8px; font-size: 14px;">0%</p>
        </div>
    </div>

    <div id="editor-screen" class="screen">
        <div id="video-container">
            <div id="player"></div>
        </div>
        
        <div id="toolbar">
            <button class="tool-btn" id="play-pause-btn">Play/Pause</button>
            <button class="tool-btn" onclick="seekVideo(-3)">⏪ 3s</button>
            <button class="tool-btn" onclick="seekVideo(3)">⏩ 3s</button>
            <button class="tool-btn" id="export-btn">Export JSON</button>
            <span id="save-indicator" style="align-self: center; font-size: 12px;">Saved</span>
        </div>

        <div id="transcript-area">
            <div id="virtual-scroller-content"></div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- 1. CORE STATE & ARCHITECTURE ---
        const AppState = {
            videoId: null,
            sentences: [],
            isDirty: false,
            isPlaying: false,
            player: null,
            history: [] // Undo/Redo Engine basis
        };

        // --- 2. STORAGE ENGINE (IndexedDB) ---
        const DB = {
            dbName: 'TranscriptEditorDB',
            dbVersion: 1,
            db: null,
            init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.dbName, this.dbVersion);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('projects')) {
                            db.createObjectStore('projects', { keyPath: 'videoId' });
                        }
                    };
                    req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
                    req.onerror = (e) => reject(e);
                });
            },
            async saveProject(videoId, data) {
                return new Promise((resolve) => {
                    const tx = this.db.transaction('projects', 'readwrite');
                    tx.objectStore('projects').put({ videoId, data, updatedAt: Date.now() });
                    tx.oncomplete = () => resolve();
                });
            }
        };

 // --- 3. SENTENCE GROUPING ENGINE ---
        async function processRawJSON(rawWords) {
            updateProcessLog("Grouping Sentences...");
            const sentences = [];
            let currentSentence = null;
            let sentenceCounter = 1;
            
            const punctuationMarkers = ['।', '?', '!'];
            
            // नया लॉजिक: चेक करें कि JSON का डेटा कहाँ है
            let dataArray = [];
            if (rawWords && rawWords.results && Array.isArray(rawWords.results)) {
                dataArray = rawWords.results;
            } else if (Array.isArray(rawWords)) {
                dataArray = rawWords;
            } else {
                alert("Invalid JSON format!");
                return [];
            }

            const totalWords = dataArray.length;
            const chunkSize = 2000;
            
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');

            for (let i = 0; i < totalWords; i += chunkSize) {
                const chunk = dataArray.slice(i, i + chunkSize);
                
                chunk.forEach((item, chunkIndex) => {
                    const index = i + chunkIndex;
                    
                    // नए और पुराने दोनों JSON फॉर्मेट को सपोर्ट करने के लिए:
                    let wordText = "";
                    let conf = 1;
                    if (item.alternatives && item.alternatives.length > 0) {
                        wordText = item.alternatives[0].content || "";
                        conf = item.alternatives[0].confidence !== undefined ? item.alternatives[0].confidence : 1;
                    } else {
                        wordText = item.w || item.word || "";
                        conf = item.c !== undefined ? item.c : 1;
                    }
                    
                    let startTime = item.start_time !== undefined ? item.start_time : (item.s || 0);
                    let endTime = item.end_time !== undefined ? item.end_time : (item.e || startTime);
                    let isEos = item.is_eos === true;

                    if (!currentSentence) {
                        currentSentence = {
                            id: `s${String(sentenceCounter++).padStart(6, '0')}`,
                            speaker: "UU",
                            sentence_start: startTime,
                            words: [],
                            shuddh_text: ""
                        };
                    }

                    currentSentence.words.push({ c: conf });
                    currentSentence.sentence_end = endTime;
                    
                    // अगर विराम चिह्न पहले वाले शब्द से जुड़ता है (space न आए)
                    if (item.attaches_to === "previous") {
                         currentSentence.shuddh_text = currentSentence.shuddh_text.trim() + wordText + " ";
                    } else {
                         currentSentence.shuddh_text += wordText + " ";
                    }

                    // वाक्य खत्म होने का लॉजिक
                    const isPunctuation = punctuationMarkers.some(p => wordText.includes(p)) || isEos;
                    const nextItem = dataArray[index + 1];
                    let nextStartTime = nextItem ? (nextItem.start_time !== undefined ? nextItem.start_time : (nextItem.s || 0)) : null;
                    const isLongSilence = nextItem && (nextStartTime - endTime > 1.2);

                    if (isPunctuation || isLongSilence || index === totalWords - 1) {
                        currentSentence.shuddh_text = currentSentence.shuddh_text.trim();
                        sentences.push({...currentSentence});
                        currentSentence = null;
                    }
                });

                const progress = Math.min(100, Math.round(((i + chunkSize) / totalWords) * 100));
                progressBar.style.width = `${progress}%`;
                progressText.innerText = `${progress}%`;

                await new Promise(resolve => setTimeout(resolve, 0));
            }
            
            return sentences;
        }

        // --- 4. VIRTUALIZED RENDERING ENGINE ---
        // For a true 50k word file, a full math-based Virtual Scroller is needed.
        // This is a minimal requestAnimationFrame based batch renderer for safe DOM insertion.
        function renderSentences() {
            const container = document.getElementById('virtual-scroller-content');
            container.innerHTML = '';
            const frag = document.createDocumentFragment();

            // Render first 100 for immediate load, lazy load rest (simplified virtualization)
            const renderBatch = AppState.sentences.slice(0, 100); 

            renderBatch.forEach((s) => {
                const card = document.createElement('div');
                card.className = 'sentence-card';
                card.dataset.id = s.id;
                card.dataset.start = s.sentence_start;
                
                // Confidence calc
                const avgConf = s.words.reduce((acc, w) => acc + (w.c || 1), 0) / s.words.length;
                let confClass = 'conf-high';
                if(avgConf < 0.85) confClass = 'conf-med';
                if(avgConf < 0.75) confClass = 'conf-low';
                if(avgConf < 0.50) confClass = 'conf-poor';

                card.innerHTML = `
                    <div class="card-header">
                        <span><b class="speaker-edit" contenteditable="true">${s.speaker}</b> | ${s.id}</span>
                        <span>⏱ ${s.sentence_start.toFixed(2)}s - ${s.sentence_end.toFixed(2)}s | <span class="${confClass}">Conf: ${(avgConf*100).toFixed(0)}%</span></span>
                    </div>
                    <textarea class="shuddh-text-area" oninput="autoGrow(this); handleTextEdit('${s.id}', this.value)" onfocus="pauseForEdit()">${s.shuddh_text}</textarea>
                `;
                
                // Click to seek
                card.querySelector('.card-header').addEventListener('click', () => {
                    if(AppState.player) AppState.player.seekTo(s.sentence_start);
                });

                frag.appendChild(card);
            });
            container.appendChild(frag);
        }

        // --- 5. UI INTERACTIONS & AUTOSAVE ---
        let saveTimeout;
        function handleTextEdit(id, newText) {
            const sentence = AppState.sentences.find(s => s.id === id);
            if(sentence) {
                sentence.shuddh_text = newText;
                document.getElementById('save-indicator').innerText = 'Saving...';
                
                // Debounced Autosave
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(async () => {
                    await DB.saveProject(AppState.videoId, AppState.sentences);
                    document.getElementById('save-indicator').innerText = 'Saved';
                }, 300);
            }
        }

        function autoGrow(element) {
            element.style.height = "5px";
            element.style.height = (element.scrollHeight)+"px";
        }

        function pauseForEdit() {
            if(AppState.player && AppState.player.getPlayerState() === 1) { // 1 = playing
                AppState.player.pauseVideo();
            }
        }

        function updateProcessLog(msg) {
            document.getElementById('process-log').innerText = msg;
        }

        // --- 6. YOUTUBE API SYNC ---
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function onYouTubeIframeAPIReady() {
            // Fired globally when YT API loads
        }

        function initPlayer(videoId) {
            AppState.player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: { 'playsinline': 1 },
                events: {
                    'onReady': () => { startPlaybackTracker(); }
                }
            });
        }

        function startPlaybackTracker() {
            setInterval(() => {
                if(!AppState.player || AppState.player.getPlayerState() !== 1) return;
                // Playback tracking logic can be expanded here
            }, 500);
        }

        function seekVideo(seconds) {
            if(AppState.player && AppState.player.getCurrentTime) {
                const cTime = AppState.player.getCurrentTime();
                AppState.player.seekTo(cTime + seconds);
            }
        }

        // --- 7. EXPORT ENGINE ---
        document.getElementById('export-btn').addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(AppState.sentences, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "refined_transcript.json");
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        // --- 8. INITIALIZATION FLOW ---
        document.addEventListener('DOMContentLoaded', async () => {
            await DB.init();
            
            const urlInput = document.getElementById('yt-url');
            const fileInput = document.getElementById('json-upload');
            const startBtn = document.getElementById('start-btn');
            const quickTestLink = document.getElementById('quick-test-link');

            function checkInputs() {
                if(urlInput.value.trim() !== '' && fileInput.files.length > 0) {
                    startBtn.style.display = 'block';
                } else {
                    startBtn.style.display = 'none';
                }
            }

            if (quickTestLink) {
                quickTestLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    urlInput.value = quickTestLink.innerText;
                    checkInputs();
                });
            }

            fileInput.addEventListener('change', checkInputs);
            urlInput.addEventListener('input', checkInputs);

            startBtn.addEventListener('click', () => {
                const vId = extractVideoID(urlInput.value);
                if(!vId) return alert("Invalid YouTube URL");
                
                const file = fileInput.files[0];
                if(!file) return alert("Please select a JSON file");

                AppState.videoId = vId;
                document.getElementById('setup-screen').classList.remove('active');
                document.getElementById('processing-screen').classList.add('active');
                updateProcessLog("Reading File...");

                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        updateProcessLog("Parsing JSON...");
                        const rawJsonData = JSON.parse(ev.target.result);
                        
                        AppState.sentences = await processRawJSON(rawJsonData);
                        
                        document.getElementById('processing-screen').classList.remove('active');
                        document.getElementById('editor-screen').classList.add('active');
                        
                        initPlayer(AppState.videoId);
                        renderSentences();
                        await DB.saveProject(AppState.videoId, AppState.sentences);
                    } catch (err) {
                        console.error(err);
                        alert("Error processing file: " + err.message);
                        document.getElementById('processing-screen').classList.remove('active');
                        document.getElementById('setup-screen').classList.add('active');
                    }
                };
                reader.readAsText(file);
            });

            // Play/Pause handling
            document.getElementById('play-pause-btn').addEventListener('click', () => {
                if(!AppState.player) return;
                const state = AppState.player.getPlayerState();
                if(state === 1) AppState.player.pauseVideo();
                else AppState.player.playVideo();
            });
        });
    </script>
</body>
</html>
